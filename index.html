<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Sistema Solar | Unity3D</title>
    <style>
        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1b2735 0%, #050505 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Efeito de Estrelas ao fundo */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 0;
            pointer-events: none;
        }

        /* Container Principal */
        .container {
            z-index: 1;
            max-width: 800px;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #bdc3c7;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Estilização do Iframe */
        .widget-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        iframe {
            max-width: 100%;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #555;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <h1>Sistema Solar</h1>
        <p>Explore a imensidão do espaço através desta simulação interativa desenvolvida em <strong>Unity3D</strong>. 
        Conheça os planetas e a dinâmica do nosso sistema de forma imersiva.</p>

        <div class="widget-container">
            <iframe frameborder="0" src="https://itch.io/embed/4541362" width="552" height="167">
                <a href="https://pedrocorreia.itch.io/sistema-solar">Sistema Solar by pedrocorreia</a>
            </iframe>
        </div>
    </div>

    <footer>
        Pedro Correia &copy; 2026 | Desenvolvido com Unity3D
    </footer>

</body>
</html>
